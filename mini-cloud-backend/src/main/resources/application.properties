# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/minicloud?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL Initialization (Live Feeding)
spring.sql.init.mode=always
spring.sql.init.schema-locations=file:../database/init/schema.sql
spring.sql.init.data-locations=file:../database/init/data.sql

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# Storage Configuration (Week 2)
minicloud.storage.root=./storage
