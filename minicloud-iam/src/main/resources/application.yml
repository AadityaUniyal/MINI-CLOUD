server:
  port: 8081

spring:
  application:
    name: minicloud-iam
  datasource:
    url: jdbc:mysql://localhost:3306/minicloud_iam?createDatabaseIfNotExist=true
    username: minicloud_admin
    password: minicloud_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
