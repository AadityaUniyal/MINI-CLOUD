# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/minicloud
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# SQL Initialization (Live Feeding)
spring.sql.init.mode=always
spring.sql.init.schema-locations=file:../database/init/schema.sql
spring.sql.init.data-locations=file:../database/init/data.sql

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8082

# Storage Configuration (Week 2)
minicloud.storage.root=./storage
