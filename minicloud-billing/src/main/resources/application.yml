server:
  port: 8090

spring:
  application:
    name: minicloud-billing
  datasource:
    url: jdbc:postgresql://localhost:5432/minicloud
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
