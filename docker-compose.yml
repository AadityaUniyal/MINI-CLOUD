services:
  # Relational Database (PostgreSQL — used by ALL microservices)
  postgres-db:
    image: postgres:14-alpine
    container_name: minicloud-postgres
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=minicloud
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minicloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # Object Storage (MinIO)
  minio:
    image: minio/minio
    container_name: minicloud-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: minicloud-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Eureka Discovery Server
  eureka-server:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-eureka-server
    container_name: minicloud-eureka
    ports:
      - "8761:8761"
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: on-failure

  # IAM Service
  iam-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-iam
    container_name: minicloud-iam
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 240s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: on-failure

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-api-gateway
    container_name: minicloud-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: on-failure

  # Backend Service (Core Logic)
  backend-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-backend
    container_name: minicloud-backend
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MINICLOUD_IAM_URL=http://iam-service:8081
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s
    restart: on-failure

  # Compute Service
  compute-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-compute
    container_name: minicloud-compute
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      # Docker-in-Docker: point to the host daemon
      - DOCKER_HOST=tcp://host.docker.internal:2375
    volumes:
      # Windows: use npipe; Linux/Mac: use the unix socket below
      # Linux/Mac: - /var/run/docker.sock:/var/run/docker.sock
      - //./pipe/docker_engine://./pipe/docker_engine
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s
    restart: on-failure

  # Database Management Service
  database-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-database-service
    container_name: minicloud-database
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: on-failure

  # Monitoring Service
  monitoring-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-monitoring
    container_name: minicloud-monitoring
    ports:
      - "8087:8087"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: on-failure

  # Billing Service
  billing-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-billing
    container_name: minicloud-billing
    ports:
      - "8090:8090"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: on-failure

  # Storage Service (Object Storage via MinIO)
  storage-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-storage
    container_name: minicloud-storage
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MINIO_ENDPOINT=http://minio:9000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: on-failure

  # Load Balancer Service
  loadbalancer-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-loadbalancer
    container_name: minicloud-loadbalancer
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/minicloud
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: on-failure

  # Notification Service (Email/Alerts)
  notification-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-notification
    container_name: minicloud-notification
    ports:
      - "8088:8088"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MAIL_USERNAME=${MAIL_USERNAME:-your-email@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-your-app-password}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: on-failure

  # Portal Service (User-facing)
  portal-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.multi
      args:
        APP_MODULE: minicloud-portal
    container_name: minicloud-portal
    ports:
      - "8089:8089"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MINICLOUD_GATEWAY_URL=http://api-gateway:8080
    depends_on:
      eureka-server:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: on-failure

networks:
  default:
    name: minicloud-network

volumes:
  minio_data:
