server:
  port: 8084

spring:
  application:
    name: minicloud-storage
  datasource:
    url: jdbc:postgresql://localhost:5432/minicloud
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: minicloud-assets

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
