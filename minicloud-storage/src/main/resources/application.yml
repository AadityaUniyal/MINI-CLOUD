server:
  port: 8084

spring:
  application:
    name: minicloud-storage
  datasource:
    url: jdbc:mysql://localhost:3306/minicloud_storage?createDatabaseIfNotExist=true
    username: minicloud_admin
    password: minicloud_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: minicloud-assets

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
